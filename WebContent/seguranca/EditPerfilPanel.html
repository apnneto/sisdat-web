<wicket:extend>
	
	<div class="tam1">
		<fieldset class="ci">
			<legend><wicket:message key="usuario.label.perfil"/></legend>
	        <div class="f1 tam2">
		        <label>
		        	<span class="obrig" title="Preenchimento obrigatório">&#8226;</span> 
		        	<wicket:message key="perfil.label.nome"/>:
		        </label>
		        <input type="text" wicket:id="nome" class="valorCampo"/>
	    	</div>
	    	

	        <div class="f1 tam3">
		       	<label> <span class="obrig" title="Preenchimento obrigatório">&#8226;</span>
		       			<wicket:message key="perfil.label.tipoUsuario"/>:
		       	</label>
	        	<select wicket:id="tipoUsuario" style="min-width: 260px" class="editSelect"/>
	    	</div>
    	
	   	</fieldset>

       <fieldset class="ci">
            <legend><wicket:message key="perfil.label.funcionalidades"/></legend>
			
			<div class="f1 tam3">
            	<label>Filtrar por modulo:</label>
                <select wicket:id="modulo" class="editSelect"/>
            </div>
			
			<div class="f1 tam1">
	            <br clear="all"/><br clear="all"/>

            </div>

        </fieldset>
	        
	    
	</div>
	    
</wicket:extend>
