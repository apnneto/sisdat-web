<wicket:extend>

	<script
		src="/sisdat-web/resources/com.frw.base.web.pages.BasePage/js/jquery.maskedinput.js"
		type="text/javascript"></script>
	<script
		src="/sisdat-web/resources/com.frw.base.web.pages.BasePage/js/jquery.format.js"
		type="text/javascript"></script>
		
	<fieldset class="ci">

		<div class="f2 tam1">
			<label> <wicket:message key="label.razao.social" />
			</label> <input type="text" wicket:id="razaoSocial" maxlength="100" />
		</div>
		
		<div class="f4 tam4">
			<label> <wicket:message key="label.crea" />
			</label> <input type="text" wicket:id="crea" maxlength="20" />
		</div>

		<div class="f2 tam1">
			<label> <span class="obrig" title="Preenchimento obrigatorio">&#8226;</span>
				<wicket:message key="label.nome.fantasia" />
			</label> <input type="text" wicket:id="nomeFantasia" maxlength="100" />
		</div>
		
		<div class="f4 tam4">
			<label><wicket:message key="label.cnpj" /></label>
			<input type="text" wicket:id="cnpj" maxlength="20" 
			onfocus="$(this).mask('99.999.999/9999-99')" />
		</div>

		<div class="f4 tam4">
			<label> <span class="obrig" title="Preenchimento obrigatorio">&#8226;</span>
				<wicket:message key="label.telefone" />
			</label> <input type="text" wicket:id="telefone" onfocus="$(this).mask('(99) 9999-9999?9')" />
		</div>


		<div class="f2 tam1">
			<label> <span class="obrig" title="Preenchimento obrigatorio">&#8226;</span>
				<wicket:message key="label.email" />
			</label> <input type="text" wicket:id="email" maxlength="50" />
		</div>

	</fieldset>

	<fieldset class="ci">
		<legend>
			<wicket:message key="label.endereco" />
		</legend>
		<div class="f1 tam4">
			<label> <span class="obrig" title="Preenchimento obrigatório">&#8226;</span>
				<wicket:message key="label.cep" />
			</label> <input type="text" wicket:id="cep" onfocus="$(this).mask('99999-999')" />
		</div>
		
		<div class="f3 tam1">
			<label> <span class="obrig" title="Preenchimento obrigatório">&#8226;</span>
				<wicket:message key="label.lograduro" />
			</label> <input type="text" wicket:id="logradouro" maxlength="100" />
		</div>
		
		<div class="f4 tam4">
			<label> <span class="obrig" title="Preenchimento obrigatório">&#8226;</span>
				<wicket:message key="label.numero.endereco" />
			</label> <input type="text" wicket:id="numero" maxlength="100" />
		</div>

		<div class="f3 tam3">
			<label> <wicket:message
					key="label.complemento" />
			</label> <input type="text" wicket:id="complemento" maxlength="50" />
		</div>

		<div class="f3 tam1">
			<label> <span class="obrig" title="Preenchimento obrigatório">&#8226;</span>
				<wicket:message key="label.bairro" />
			</label> <input type="text" wicket:id="bairro" maxlength="50" />
		</div>

		<div class="f4 tam4">
			<label> <span class="obrig" title="Preenchimento obrigatório">&#8226;</span>
				<wicket:message key="label.sigla.estado" />
			</label> <input type="text" wicket:id="siglaEstado" maxlength="2" />
		</div>

		<div class="f3 tam1">
			<label> <span class="obrig" title="Preenchimento obrigatório">&#8226;</span>
				<wicket:message key="label.cidade" />
			</label> <input type="text" wicket:id="cidade" maxlength="50" />
		</div>

	</fieldset>

</wicket:extend>
