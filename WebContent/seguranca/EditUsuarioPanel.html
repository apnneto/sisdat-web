<wicket:extend>

<script
		src="/sisdat-web/resources/com.frw.base.web.pages.BasePage/js/jquery.maskedinput.js"
		type="text/javascript"></script>
	<script
		src="/sisdat-web/resources/com.frw.base.web.pages.BasePage/js/jquery.format.js"
		type="text/javascript"></script>
		
		
	<fieldset class="ci">

		<div class="f1 tam2">
			<label><span class="obrig" title="Preenchimento obrigatˇrio">&#8226;</span>
				<wicket:message key="usuario.label.nome" /></label> <input type="text"
				wicket:id="nome" />
		</div>

		<div class="f2 tam3">
			<label><wicket:message key="usuario.label.cpf" /></label> <input
				type="text" wicket:id="cpf" onfocus="$(this).mask('999.999.999-99')" />
		</div>

		<div class="f2 tam3">
			<label><span class="obrig" title="Preenchimento obrigatˇrio">&#8226;</span>
				<wicket:message key="usuario.label.login" /></label> <input type="text"
				wicket:id="login" maxlength="45" />
		</div>
		<div class="f2 tam3">
			<label><span class="obrig" title="Preenchimento obrigatˇrio">&#8226;</span>
				<wicket:message key="usuario.label.senha" /></label> <input type="password"
				wicket:id="senha" />
		</div>

		<div class="f2 tam3">
			<label><span class="obrig" title="Preenchimento obrigatorio">&#8226;</span>
			<wicket:message key="label.empresa" /></label>
			<select wicket:id="empresa"/>
		</div>

		<div class="f4 tam1">
			<label><wicket:message key="usuario.label.ativo" /></label> <input
				type="checkbox" wicket:id="ativo" />
		</div>

	</fieldset>
	
	<!-- <div class="f1">
		<input type="button" wicket:id="goToEmpresa" />
	</div> -->

</wicket:extend>
