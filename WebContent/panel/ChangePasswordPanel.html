<wicket:panel>
    <span class="erroFeeBack" wicket:id="feedback" />

    <div style="padding: 2px;">
        <form wicket:id="changePasswordForm" >

            <br clear="all"/>
            
            <label>Senha Atual:</label>
            <input type="password" wicket:id="txtSenhaAtual" class="valorCampo"/>

            <br clear="all"/>
            <br clear="all"/>


            <label>Nova senha:</label>
            <input type="password" wicket:id="txtSenhaNova" class="valorCampo"/>

            <br clear="all"/>
            <br clear="all"/>


            <label>Confirmacão da Nova senha:</label>
            <input type="password" wicket:id="txtConfirmacaoSenhaNova" class="valorCampo"/>

            <br clear="all"/>
            <br clear="all"/>
            <br clear="all"/>

            <input type="button" wicket:id="btnAlterarSenha"  class="botaoGrande"/>

        </form>
    </div>
</wicket:panel>
