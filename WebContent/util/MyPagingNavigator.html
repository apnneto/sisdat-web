<html xmlns:wicket>

    <wicket:panel>
        <div class="pag">
            <a wicket:id="first" class="pag-seta">&lt;&lt;</a>
            <a wicket:id="prev" class="pag-seta">&lt;</a>
            
            <span wicket:id="navigation">
                <a wicket:id="pageLink" href="#"><span wicket:id="pageNumber"></span></a>
            </span>
            
            <a wicket:id="next" class="pag-seta">&gt;</a>
            <a wicket:id="last" class="pag-seta">&gt;&gt;</a>

        </div>
    </wicket:panel>    

</html>
