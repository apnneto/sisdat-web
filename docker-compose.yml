services:
  db:
    image: mysql:8.0
    command: >
      --lower_case_table_names=1
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --skip-character-set-client-handshake
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sisdat_schema
      MYSQL_USER: sisdat
      MYSQL_PASSWORD: sisdat
    volumes:
      - db-data:/var/lib/mysql
      - ./scripts/mysql-init.sql:/docker-entrypoint-initdb.d/mysql-init.sql:ro
    ports:
      - "3307:3306"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "sisdat", "-psisdat"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  payara:
    build:
      context: .
      dockerfile: Dockerfile.payara
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  db-data: